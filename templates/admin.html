<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yönetici Paneli — Selenay & Ahmet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Jost:wght@400;500&display=swap" rel="stylesheet">
<style>
    :root {
        --ivory: #FBF6EE;
        --gold: #C9A66B;
        --gold-dark: #9C7A3C;
        --charcoal: #33302B;
        --line: #E6DCC8;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: 'Jost', sans-serif;
        background: var(--ivory);
        color: var(--charcoal);
        padding: 28px 20px 60px;
    }
    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1100px;
        margin: 0 auto 28px;
    }
    h1 {
        font-family: 'Cormorant Garamond', serif;
        font-size: 30px;
        margin: 0;
    }
    a.logout {
        color: var(--gold-dark);
        text-decoration: none;
        font-size: 14px;
        border: 1px solid var(--gold);
        padding: 8px 16px;
        border-radius: 999px;
    }
    .count {
        max-width: 1100px;
        margin: 0 auto 20px;
        color: #6B655C;
        font-size: 14px;
    }
    .grid {
        max-width: 1100px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 16px;
    }
    .photo-card {
        background: #fff;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--line);
        box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    }
    .photo-card img {
        width: 100%;
        height: 190px;
        object-fit: cover;
        display: block;
    }
    .photo-card .filename {
        font-size: 11px;
        color: #8a8478;
        padding: 8px 10px 2px;
        word-break: break-all;
    }
    .photo-card .guest-name {
        font-size: 13.5px;
        font-weight: 500;
        color: var(--gold-dark);
        padding: 0 10px 10px;
    }
    .photo-card .guest-name.unknown {
        color: #b5aa8f;
        font-weight: 400;
        font-style: italic;
    }
    .empty {
        max-width: 1100px;
        margin: 60px auto;
        text-align: center;
        color: #8a8478;
    }
</style>
</head>
<body>

<header>
    <h1>📂 Yüklenen Fotoğraflar</h1>
    <a class="logout" href="/logout">Çıkış Yap</a>
</header>

<div class="count">{{ photos|length }} fotoğraf</div>

{% if photos %}
<div class="grid">
    {% for photo in photos %}
    <div class="photo-card">
        <img src="/uploads/{{ photo.filename }}" loading="lazy" alt="{{ photo.filename }}">
        {% if photo.guest_name %}
            <div class="guest-name">👤 {{ photo.guest_name }}</div>
        {% else %}
            <div class="guest-name unknown">İsimsiz</div>
        {% endif %}
        <div class="filename">{{ photo.filename }}</div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="empty">Henüz fotoğraf yüklenmedi.</div>
{% endif %}

</body>
</html>
